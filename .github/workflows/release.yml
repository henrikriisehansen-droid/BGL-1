name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync
        
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build with Flet
        run: uv run flet build ${{ matrix.platform }} --yes --no-rich-output --output dist
        
      - name: Package macOS (Zip)
        if: matrix.platform == 'macos'
        run: |
          cd dist
          zip -ry ../BGL-macos.zip .
          
      - name: Package Windows (Zip)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath BGL-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BGL-${{ matrix.platform }}
          path: BGL-${{ matrix.platform }}.zip

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BGL-macos/*.zip
            BGL-windows/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
